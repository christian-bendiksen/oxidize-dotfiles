accent               = "#A4B465"
cursor               = "#F0BB78"
foreground           = "#CFCAB2"
background           = "#151A16"
selection_foreground = "#151A16"
selection_background = "#A4B465"

# UI / terminal base colors
color0  = "#151A16"   # base
color1  = "#C07A4F"   # errors
color2  = "#A4B465"   # success, primary accent
color3  = "#F0BB78"   # warnings
color4  = "#626F47"   # info
color5  = "#7E7A66"   # secondary
color6  = "#6F8F7A"   # accent
color7  = "#CFCAB2"   # main text

# bright colors / syntax highlight colors
color8  = "#1E2520"   # surface
color9  = "#F0BB78"   # constants, numbers, attention
color10 = "#A4B465"   # strings, additions
color11 = "#E6DDC7"   # types, attributes
color12 = "#7F9168"   # functions, constructors
color13 = "#8F947F"   # keywords, namespaces
color14 = "#7FA696"   # operators, escapes
color15 = "#F5ECD5"   # peak highlight only
